// ─── FIRESTORE LISTENERS ──────────────────────────────────────────────────────
function startListeners() {
  // Parts
  const q = query(collection(db, 'parts'), orderBy('ts', 'desc'));
  unsubParts = onSnapshot(q, snap => {
    parts = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    render();
  }, err => console.error('Parts listener:', err));

  // Custom brands/models
  unsubCustom = onSnapshot(collection(db, 'customBrands'), snap => {
    customBrands = {};
    snap.docs.forEach(d => {
      const dat = d.data();
      if (!customBrands[dat.sid]) customBrands[dat.sid] = {};
      if (!customBrands[dat.sid][dat.brand]) customBrands[dat.sid][dat.brand] = [];
      dat.models.forEach(m => {
        if (!customBrands[dat.sid][dat.brand].includes(m))
          customBrands[dat.sid][dat.brand].push(m);
      });
      // inject into DEFS
      const sec = DEFS.find(s => s.id === dat.sid);
      if (sec) {
        let b = sec.brands.find(x => x.name === dat.brand);
        if (!b) { b = { name: dat.brand, models: [] }; sec.brands.push(b); }
        dat.models.forEach(m => { if (!b.models.includes(m)) b.models.push(m); });
      }
    });
    render();
  }, err => console.error('Custom listener:', err));

  // openState from localStorage
  try { openState = JSON.parse(localStorage.getItem('smc-open') || '{}'); } catch(e) {}
}

// ─── CLOUDINARY UPLOAD ────────────────────────────────────────────────────────
async function uploadToCloudinary(file) {
  const fd = new FormData();
  fd.append('file', file);
  fd.append('upload_preset', CLOUDINARY_PRESET);
  fd.append('folder', 'seiko-mod');
  const res = await fetch(`https://api.cloudinary.com/v1_1/${CLOUDINARY_CLOUD}/image/upload`, {
    method: 'POST', body: fd
  });
  if (!res.ok) throw new Error('Upload failed');
  const data = await res.json();
  return data.secure_url;
}

// ─── SAVE / DELETE PART ───────────────────────────────────────────────────────
window.savePart = async function() {
  const name = document.getElementById('f-name').value.trim();
  if (!name) { toast('Le nom est obligatoire', true); return; }
  if (uploadingImg) { toast('Photo en cours d\'upload…', true); return; }

  const payload = {
    sid: addCtx.sid, brand: addCtx.brand, model: addCtx.model, name,
    price: document.getElementById('f-price').value || '',
    sku: document.getElementById('f-sku').value || '',
    compat: document.getElementById('f-compat').value || '',
    link: document.getElementById('f-link').value || '',
    notes: document.getElementById('f-notes').value || '',
    stock: document.getElementById('f-stock').value || 'stock',
    img: currentImgUrl || '',
    ts: Date.now(),
  };

  try {
    setSaveBtn(true);
    if (editingId) {
      await updateDoc(doc(db, 'parts', editingId), payload);
      toast('Pièce modifiée ✓');
    } else {
      await addDoc(collection(db, 'parts'), payload);
      toast('Pièce ajoutée ✓');
    }
    closeModal('add-modal');
  } catch(e) {
    toast('Erreur Firebase : ' + e.message, true);
  } finally {
    setSaveBtn(false);
  }
};

window.deletePart = async function(id) {
  if (!confirm('Supprimer cette pièce ?')) return;
  try {
    await deleteDoc(doc(db, 'parts', id));
    closeModal('detail-modal');
    toast('Pièce supprimée');
  } catch(e) { toast('Erreur : ' + e.message, true); }
};

// ─── SAVE CUSTOM BRAND/MODEL ──────────────────────────────────────────────────
window.saveCustom = async function() {
  const val = document.getElementById('custom-inp').value.trim();
  if (!val) return;
  const ctx = customCtx;
  const sec = DEFS.find(s => s.id === ctx.sid);

  try {
    if (ctx.type === 'brand') {
      if (sec.brands.find(b => b.name === val)) { toast('Marque déjà existante', true); return; }
      await addDoc(collection(db, 'customBrands'), { sid: ctx.sid, brand: val, models: [] });
      toast(`"${val}" ajouté ✓`);
    } else {
      const b = sec.brands.find(x => x.name === ctx.brand);
      if (!b) return;
      if (b.models.includes(val)) { toast('Modèle déjà existant', true); return; }
      // find existing doc or create
      const existing = Array.from(document.querySelectorAll('[data-cid]'))
        .find(el => el.dataset.csid === ctx.sid && el.dataset.cbrand === ctx.brand);
      // simpler: always add new doc entry
      await addDoc(collection(db, 'customBrands'), { sid: ctx.sid, brand: ctx.brand, models: [val] });
      toast(`"${val}" ajouté ✓`);
    }
    closeModal('custom-modal');
  } catch(e) { toast('Erreur : ' + e.message, true); }
};

// ─── DELETE MODEL / BRAND (tous, base ou custom) ──────────────────────────────
window.deleteModel = async function(sid, brand, model) {
  const hasParts = parts.some(p => p.sid===sid && p.brand===brand && p.model===model);
  const msg = hasParts
    ? `Supprimer le modèle "${model}" ?\n⚠️ ${parts.filter(p=>p.sid===sid&&p.brand===brand&&p.model===model).length} pièce(s) associée(s) sera également supprimée(s).`
    : `Supprimer le modèle "${model}" ?`;
  if (!confirm(msg)) return;
  try {
    // Supprimer les pièces associées
    const toDelete = parts.filter(p => p.sid===sid && p.brand===brand && p.model===model);
    for (const p of toDelete) await deleteDoc(doc(db, 'parts', p.id));
    // Supprimer dans Firestore customBrands si custom
    const snap = await getDocs(collection(db, 'customBrands'));
    for (const d of snap.docs) {
      const dat = d.data();
      if (dat.sid===sid && dat.brand===brand && dat.models.includes(model)) {
        const newModels = dat.models.filter(m => m !== model);
        if (newModels.length === 0) await deleteDoc(doc(db, 'customBrands', d.id));
        else await updateDoc(doc(db, 'customBrands', d.id), { models: newModels });
      }
    }
    // Supprimer du DEFS local (modèles de base)
    const sec = DEFS.find(s => s.id===sid);
    const b = sec && sec.brands.find(x => x.name===brand);
    if (b) b.models = b.models.filter(m => m !== model);
    toast(`Modèle "${model}" supprimé`);
    renderMain();
  } catch(e) { toast('Erreur : ' + e.message, true); }
};

window.deleteBrand = async function(sid, brand) {
  const hasParts = parts.some(p => p.sid===sid && p.brand===brand);
  const cnt = parts.filter(p => p.sid===sid && p.brand===brand).length;
  const msg = hasParts
    ? `Supprimer la marque "${brand}" ?\n⚠️ ${cnt} pièce(s) associée(s) sera également supprimée(s).`
    : `Supprimer la marque "${brand}" ?`;
  if (!confirm(msg)) return;
  try {
    // Supprimer toutes les pièces de cette marque
    const toDelete = parts.filter(p => p.sid===sid && p.brand===brand);
    for (const p of toDelete) await deleteDoc(doc(db, 'parts', p.id));
    // Supprimer dans Firestore customBrands
    const snap = await getDocs(collection(db, 'customBrands'));
    for (const d of snap.docs) {
      const dat = d.data();
      if (dat.sid===sid && dat.brand===brand) await deleteDoc(doc(db, 'customBrands', d.id));
    }
    // Supprimer du DEFS local
    const sec = DEFS.find(s => s.id===sid);
    if (sec) sec.brands = sec.brands.filter(b => b.name !== brand);
    toast(`Marque "${brand}" supprimée`);
    renderMain();
  } catch(e) { toast('Erreur : ' + e.message, true); }
};

// ─── IMG HANDLER ─────────────────────────────────────────────────────────────
window.handleImg = async function(input) {
  const file = input.files[0]; if (!file) return;
  uploadingImg = true;
  setImgZoneLoading(true);
  try {
    const url = await uploadToCloudinary(file);
    currentImgUrl = url;
    document.getElementById('img-prev').src = url;
    document.getElementById('img-prev').style.display = 'block';
    document.getElementById('img-ph').style.display = 'none';
    document.getElementById('img-zone').classList.add('filled');
    toast('Photo uploadée ✓');
  } catch(e) {
    toast('Erreur upload photo — vérifiez le preset Cloudinary', true);
    console.error(e);
  } finally {
    uploadingImg = false;
    setImgZoneLoading(false);
  }
};

function setImgZoneLoading(on) {
  document.getElementById('img-ph').innerHTML = on

}

// ─── RENDER ───────────────────────────────────────────────────────────────────
function render() {
  renderSidebar();

}

function renderSidebar() {
  const el = document.getElementById('sidebar');
  const total = parts.length;
  const val = parts.reduce((a,p) => a + (parseFloat(p.price)||0), 0);
  let h = '<div class="sb-top">';
  DEFS.forEach(sec => {
    const cnt = parts.filter(p => p.sid === sec.id).length;
    h += `<div class="sb-item ${activeSection===sec.id?'active':''}" onclick="setSection('${sec.id}')">
      <span class="sb-icon">${sec.icon}</span>
      <span class="sb-label">${sec.label}</span>
      ${cnt ? `<span class="sb-badge">${cnt}</span>` : ''}
    </div>`;
  });
  h += `</div>
  <div class="sb-bottom">
    <div class="sb-stat"><span class="sb-st-label">Total pièces</span><span class="sb-st-val">${total}</span></div>
    <div class="sb-stat"><span class="sb-st-label">Valeur stock</span><span class="sb-st-val gold">${val.toFixed(2)}€</span></div>
    <div class="sb-actions">
      <button class="btn-sb" onclick="exportJSON()">↓ Export</button>
      <label class="btn-sb" style="cursor:pointer">↑ Import<input type="file" accept=".json" style="display:none" onchange="importJSON(this)"></label>
    </div>
  </div>`;
  el.innerHTML = h;
}

function renderMain() {
  const sec = DEFS.find(s => s.id === activeSection);
  let h = `<div class="page-top">
    <div class="page-top-left">
      <h1 class="page-title">${sec.label}</h1>
      <p class="page-desc">${sec.desc}</p>
    </div>
    <button class="btn-outline" onclick="openAddBrand('${sec.id}')">
      <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      Nouvelle marque
    </button>
  </div>`;

  sec.brands.forEach(brand => {
    const bk = `${sec.id}::${brand.name}`;
    const bOpen = !!openState[bk];
    const bParts = parts.filter(p => p.sid===sec.id && p.brand===brand.name).length;

    h += `<div class="accordion brand-acc">
      <button class="acc-hdr brand-hdr ${bOpen?'open':''}" onclick="toggleBrand('${sec.id}','${esc(brand.name)}')">
        <svg class="chevron ${bOpen?'open':''}" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="5,3 11,8 5,13"/></svg>
        <span class="acc-title">${brand.name}</span>
        <span class="acc-badge ${bParts?'has':''}">${bParts ? bParts+' pièce'+(bParts>1?'s':'') : '—'}</span>
        <button class="add-model-btn" onclick="event.stopPropagation();openAddModel('${sec.id}','${esc(brand.name)}')">
          <svg width="11" height="11" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          Modèle
        </button>
        <button class="del-btn" onclick="event.stopPropagation();deleteBrand('${sec.id}','${esc(brand.name)}')" title="Supprimer la marque">
          <svg width="11" height="11" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><polyline points="3,6 5,6 21,6"/><path d="M19,6l-1,14H6L5,6"/><path d="M10,11v6M14,11v6"/><path d="M9,6V4h6v2"/></svg>
        </button>
      </button>
      <div class="acc-body ${bOpen?'open':''}">`;

    brand.models.forEach(model => {
      const mk = `${sec.id}::${brand.name}::${model}`;
      const mOpen = !!openState[mk];
      const mParts = parts.filter(p => p.sid===sec.id && p.brand===brand.name && p.model===model);

      h += `<div class="accordion model-acc">
        <button class="acc-hdr model-hdr ${mOpen?'open':''}" onclick="toggleModel('${sec.id}','${esc(brand.name)}','${esc(model)}')">
          <svg class="chevron sm ${mOpen?'open':''}" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="5,3 11,8 5,13"/></svg>
          <span class="model-title">${model}</span>
          ${mParts.length ? `<span class="model-cnt">${mParts.length}</span>` : ''}
          <button class="del-btn sm" onclick="event.stopPropagation();deleteModel('${sec.id}','${esc(brand.name)}','${esc(model)}')" title="Supprimer le modèle">
            <svg width="10" height="10" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><polyline points="3,6 5,6 21,6"/><path d="M19,6l-1,14H6L5,6"/><path d="M10,11v6M14,11v6"/><path d="M9,6V4h6v2"/></svg>
          </button>
        </button>
        <div class="acc-body model-body ${mOpen?'open':''}">
          <div class="parts-grid">`;

      mParts.forEach(p => {
        const stockCls = p.stock==='rupture'?'red':p.stock==='commande'?'amber':'green';
        h += `<div class="part-card" onclick="openDetail('${p.id}')">
          <div class="card-img">${p.img?`<img src="${p.img}" loading="lazy">`:`<span class="card-icon">${sec.icon}</span>`}</div>
          <div class="card-foot">
            <div class="card-stock-dot ${stockCls}"></div>
            <div class="card-info">
              <div class="card-name">${p.name}</div>
              ${p.price?`<div class="card-price">${parseFloat(p.price).toFixed(2)}€</div>`:''}
            </div>
          </div>
        </div>`;
      });

      h += `<button class="add-part-card" onclick="openAddPart('${sec.id}','${esc(brand.name)}','${esc(model)}')">
              <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
              <span>Ajouter</span>
            </button>
          </div>
        </div>
      </div>`;
    });

    h += `</div></div>`;
  });

  h += '<div style="height:48px"></div>';
  document.getElementById('main').innerHTML = h;
}

function setSection(id) { activeSection = id; document.getElementById('main').scrollTop = 0; render(); }
function esc(s) { return s.replace(/\\/g,'\\\\').replace(/'/g,"\\'"); }

function toggleBrand(sid, brand) {
  const k = `${sid}::${brand}`;
  openState[k] = !openState[k];
  localStorage.setItem('smc-open', JSON.stringify(openState));
  renderMain();
}
function toggleModel(sid, brand, model) {
  const k = `${sid}::${brand}::${model}`;
  openState[k] = !openState[k];
  localStorage.setItem('smc-open', JSON.stringify(openState));
  renderMain();
}

// ─── MODALS ───────────────────────────────────────────────────────────────────
function openAddPart(sid, brand, model) {
  editingId = null; addCtx = {sid,brand,model}; currentImgUrl = null;
  const sec = DEFS.find(s => s.id===sid);
  document.getElementById('add-title').textContent = 'Nouvelle pièce';
  document.getElementById('add-ctx').textContent = `${sec.icon}  ${sec.label}  ·  ${brand}  ·  ${model}`;
  ['f-name','f-price','f-sku','f-compat','f-link','f-notes'].forEach(id => document.getElementById(id).value='');
  document.getElementById('f-stock').value = 'stock';
  resetImg();
  openModal('add-modal');
  setTimeout(()=>document.getElementById('f-name').focus(), 80);
}

function openEditPart(id) {
  const p = parts.find(x => x.id===id); if (!p) return;
  closeModal('detail-modal');
  editingId = id; addCtx = {sid:p.sid, brand:p.brand, model:p.model}; currentImgUrl = p.img||null;
  const sec = DEFS.find(s => s.id===p.sid);
  document.getElementById('add-title').textContent = 'Modifier la pièce';
  document.getElementById('add-ctx').textContent = `${sec.icon}  ${sec.label}  ·  ${p.brand}  ·  ${p.model}`;
  document.getElementById('f-name').value = p.name;
  document.getElementById('f-price').value = p.price||'';
  document.getElementById('f-sku').value = p.sku||'';
  document.getElementById('f-compat').value = p.compat||'';
  document.getElementById('f-link').value = p.link||'';
  document.getElementById('f-notes').value = p.notes||'';
  document.getElementById('f-stock').value = p.stock||'stock';
  if (p.img) { document.getElementById('img-prev').src=p.img; document.getElementById('img-prev').style.display='block'; document.getElementById('img-ph').style.display='none'; document.getElementById('img-zone').classList.add('filled'); }
  else resetImg();
  openModal('add-modal');
}

function openDetail(id) {
  const p = parts.find(x => x.id===id); if (!p) return;
  const sec = DEFS.find(s => s.id===p.sid);
  const stockLabel = p.stock==='rupture'?'Rupture':p.stock==='commande'?'En commande':'En stock';
  const stockCls = p.stock==='rupture'?'red':p.stock==='commande'?'amber':'green';
  const f=(l,v,full)=>`<div class="dfield ${full?'full':''}"><div class="dfl">${l}</div><div class="dfv">${v}</div></div>`;

  document.getElementById('detail-body').innerHTML = `
    <div class="detail-hero">${p.img?`<img src="${p.img}">`:`<div class="hero-icon">${sec.icon}</div>`}</div>
    <div class="detail-content">
      <div class="detail-top">
        <div>
          <h2 class="detail-name">${p.name}</h2>
          <div class="detail-path">${sec.label} · ${p.brand} · ${p.model}</div>
        </div>
        <button class="modal-x" onclick="closeModal('detail-modal')">✕</button>
      </div>
      <div class="detail-row">
        ${p.price?`<div class="detail-price">${parseFloat(p.price).toFixed(2)}<span>€</span></div>`:''}
        <span class="stock-badge ${stockCls}">${stockLabel}</span>
      </div>
      <div class="detail-fields">
        ${p.sku?f('Référence SKU',`<code>${p.sku}</code>`):''}
        ${p.compat?f('Compatibilité',p.compat):''}
        ${p.brand?f('Marque',p.brand):''}
        ${p.model?f('Modèle',p.model):''}
        ${p.link?f('Fournisseur',`<a href="${p.link}" target="_blank">↗ Ouvrir le lien</a>`,true):''}
      </div>
      ${p.notes?`<div class="detail-notes"><div class="dfl">Notes</div><p>${p.notes.replace(/\n/g,'<br>')}</p></div>`:''}
      <div class="detail-actions">
        <button class="btn-outline sm" onclick="closeModal('detail-modal')">Fermer</button>
        <button class="btn-outline sm blue" onclick="openEditPart('${p.id}')">✎ Modifier</button>
        <button class="btn-outline sm red" onclick="deletePart('${p.id}')">✕ Supprimer</button>
        ${p.link?`<button class="btn-solid sm" onclick="window.open('${p.link}','_blank')">↗ Fournisseur</button>`:''}
      </div>
    </div>`;
  openModal('detail-modal');
}

function openAddBrand(sid) {
  customCtx = {type:'brand', sid};
  document.getElementById('custom-title').textContent = 'Nouvelle marque';
  document.getElementById('custom-lbl').textContent = 'Nom de la marque';
  document.getElementById('custom-inp').placeholder = 'ex: Omega Style, IWC Style…';
  document.getElementById('custom-inp').value = '';
  openModal('custom-modal');
  setTimeout(()=>document.getElementById('custom-inp').focus(),80);
}

function openAddModel(sid, brand) {
  customCtx = {type:'model', sid, brand};
  document.getElementById('custom-title').textContent = brand;
  document.getElementById('custom-lbl').textContent = 'Nom du modèle';
  document.getElementById('custom-inp').placeholder = 'ex: Speedmaster, Seamaster…';
  document.getElementById('custom-inp').value = '';
  openModal('custom-modal');
  setTimeout(()=>document.getElementById('custom-inp').focus(),80);
}

function resetImg() {
  currentImgUrl = null;
  document.getElementById('img-prev').style.display = 'none';
  setImgZoneLoading(false);
  document.getElementById('img-zone').classList.remove('filled');
  document.getElementById('img-file').value = '';
}

function setSaveBtn(loading) {
  const btn = document.getElementById('save-btn');
  btn.textContent = loading ? 'Enregistrement…' : 'Enregistrer';
  btn.disabled = loading;
}

// ─── IMPORT / EXPORT ──────────────────────────────────────────────────────────
window.exportJSON = async function() {
  const blob = new Blob([JSON.stringify({parts},null,2)],{type:'application/json'});
  const a = document.createElement('a'); a.href=URL.createObjectURL(blob);
  a.download='seiko-mod-catalogue.json'; a.click(); toast('Export téléchargé ✓');
};

window.importJSON = function(input) {
  const file = input.files[0]; if (!file) return;
  const r = new FileReader();
  r.onload = async e => {
    try {
      const d = JSON.parse(e.target.result);
      if (!d.parts) return;
      toast('Import en cours…');
      for (const p of d.parts) {
        const {id, ...data} = p;
        await addDoc(collection(db, 'parts'), {...data, ts: data.ts||Date.now()});
      }
      toast(`${d.parts.length} pièces importées ✓`);
    } catch(e) { toast('Erreur JSON', true); }
  };
  r.readAsText(file); input.value='';
};

// ─── MODAL UTILS ──────────────────────────────────────────────────────────────
function openModal(id) { document.getElementById(id).classList.remove('hidden'); }
function closeModal(id) { document.getElementById(id).classList.add('hidden'); }

// ─── TOAST ────────────────────────────────────────────────────────────────────
let _tt;
window.toast = function(msg, err) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show ' + (err?'err':'ok');
  clearTimeout(_tt); _tt = setTimeout(()=>t.classList.remove('show'), 2800);
};

// ─── KEYBOARD / CLICK OUTSIDE ────────────────────────────────────────────────
document.addEventListener('click', e => {
  ['add-modal','detail-modal','custom-modal'].forEach(id => {
    const el = document.getElementById(id);
    if (el && e.target === el) closeModal(id);
  });
});
document.addEventListener('keydown', e => {
  if (e.key==='Escape') ['add-modal','detail-modal','custom-modal'].forEach(closeModal);
  if (e.key==='Enter' && document.activeElement.tagName!=='TEXTAREA') {
    if (!document.getElementById('add-modal').classList.contains('hidden')) savePart();
    if (!document.getElementById('custom-modal').classList.contains('hidden')) saveCustom();
  }
});

// ─── BOOT ─────────────────────────────────────────────────────────────────────
startListeners();
</script>

<style>

.ctx-pill{display:inline-flex;align-items:center;background:var(--gold-glow);border:1px solid var(--gold-border);border-radius:4px;padding:5px 12px;font-family:'DM Mono',monospace;font-size:9px;color:var(--gold);margin-bottom:16px;letter-spacing:.06em;line-height:1.5}
.img-zone{border:1px dashed var(--line2);border-radius:var(--r);padding:16px;text-align:center;cursor:pointer;transition:all .15s;background:var(--bg3);min-height:90px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px}
.img-zone:hover{border-color:var(--gold-border);background:var(--gold-glow)}
.img-zone.filled{border-style:solid;border-color:var(--line2)}
.img-zone img{max-width:100%;max-height:110px;border-radius:var(--r-sm)}
.img-hint{font-family:'DM Mono',monospace;font-size:8px;color:var(--text3);letter-spacing:.1em;text-transform:uppercase}

/* ── SPINNER ── */
.spinner{width:20px;height:20px;border:1.5px solid var(--line2);border-top-color:var(--gold);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── LOADING SCREEN ── */
.loading-screen{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;z-index:999}
.loading-screen.hidden{display:none}
.loading-logo{font-family:'Cormorant',serif;font-size:26px;font-weight:500;letter-spacing:.16em;color:var(--text);text-transform:uppercase}
.loading-logo span{color:var(--gold)}
.loading-line{width:60px;height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent)}

/* ── TOAST ── */
.toast{position:fixed;bottom:24px;right:24px;padding:11px 18px;border-radius:var(--r-sm);font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.06em;z-index:999;opacity:0;transform:translateY(20px);transition:all .22s;pointer-events:none;border:1px solid;box-shadow:0 8px 32px rgba(0,0,0,.5)}
.toast.show{opacity:1;transform:translateY(0)}
.toast.ok{background:var(--bg2);color:#6abf8a;border-color:rgba(58,125,90,.3)}
.toast.err{background:var(--bg2);color:#cb6a6a;border-color:rgba(138,58,58,.3)}
</style>
</head>
<body>

<!-- LOADING -->
<div class="loading-screen" id="loading">
  <div class="loading-logo">Seiko <span>Mod</span></div>
  <div class="loading-line"></div>
  <div class="spinner"></div>
</div>

<!-- HEADER -->
<div class="hdr">
  <div class="logo">
    <div class="logo-mark">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="8"/><line x1="12" y1="2" x2="12" y2="5"/><line x1="12" y1="19" x2="12" y2="22"/><line x1="2" y1="12" x2="5" y2="12"/><line x1="19" y1="12" x2="22" y2="12"/><line x1="12" y1="12" x2="16" y2="9"/></svg>
    </div>
    <div class="logo-text">
      <div class="logo-main">Seiko Mod</div>
      <div class="logo-sub">Catalogue Admin</div>
    </div>
  </div>
  <div class="hdr-spacer"></div>
</div>

<!-- LAYOUT -->
<div class="layout">
  <nav class="sidebar" id="sidebar">
    <div class="sb-top"></div>
    <div class="sb-bottom"></div>
  </nav>
  <div class="main" id="main"></div>
</div>

<!-- ADD / EDIT MODAL -->
<div class="overlay hidden" id="add-modal">
  <div class="modal">
    <div class="modal-hdr">
      <div class="modal-title" id="add-title">Nouvelle pièce</div>
      <button class="modal-x" onclick="closeModal('add-modal')">✕</button>
    </div>
    <div class="modal-body">
      <div class="ctx-pill" id="add-ctx"></div>
      <div class="fg">
        <label>Photo</label>
        <div class="img-zone" id="img-zone" onclick="document.getElementById('img-file').click()">
          <div id="img-ph">
            <svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24" style="color:var(--ink3)"><rect x="3" y="5" width="18" height="14" rx="2"/><circle cx="12" cy="12" r="3"/><path d="M3 9l3-3h3l2-2h2l2 2h3l3 3"/></svg>
            <div class="img-hint">Cliquer pour ajouter</div>
          </div>
          <img id="img-prev" style="display:none">
          <input type="file" id="img-file" accept="image/*" style="display:none" onchange="handleImg(this)">
        </div>
      </div>
      <div class="fg"><label>Nom de la pièce *</label><input type="text" id="f-name" placeholder="ex: Bracelet Jubilée 20mm"></div>
      <div class="form-2">
        <div class="fg"><label>Prix (€)</label><input type="number" id="f-price" placeholder="0.00" min="0" step="0.01"></div>
        <div class="fg"><label>Référence SKU</label><input type="text" id="f-sku" placeholder="ex: REF-0042"></div>
      </div>
      <div class="form-2">
        <div class="fg"><label>Compatibilité</label><input type="text" id="f-compat" placeholder="SKX007, NH35…"></div>
        <div class="fg">
          <label>Stock</label>
          <select id="f-stock">
            <option value="stock">En stock</option>
            <option value="commande">En commande</option>
            <option value="rupture">Rupture</option>
          </select>
        </div>
      </div>
      <div class="fg"><label>Lien fournisseur</label><input type="url" id="f-link" placeholder="https://…"></div>
      <div class="fg"><label>Notes</label><textarea id="f-notes" placeholder="Coloris, taille, matière, état…"></textarea></div>
    </div>
    <div class="modal-footer">
      <button class="btn-outline sm" onclick="closeModal('add-modal')">Annuler</button>
      <button class="btn-solid sm" id="save-btn" onclick="savePart()">Enregistrer</button>
    </div>
  </div>
</div>

<!-- DETAIL MODAL -->
<div class="overlay hidden" id="detail-modal">
  <div class="modal detail-modal">
    <div id="detail-body"></div>
  </div>
</div>

<!-- BRAND / MODEL MODAL -->
<div class="overlay hidden" id="custom-modal">
  <div class="modal" style="max-width:360px">
    <div class="modal-hdr">
      <div class="modal-title" id="custom-title">—</div>
      <button class="modal-x" onclick="closeModal('custom-modal')">✕</button>
    </div>
    <div class="modal-body">
      <div class="fg"><label id="custom-lbl">Nom</label><input type="text" id="custom-inp" placeholder=""></div>
    </div>
    <div class="modal-footer">
      <button class="btn-outline sm" onclick="closeModal('custom-modal')">Annuler</button>
      <button class="btn-solid sm" onclick="saveCustom()">Ajouter</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script type="module">
// Hide loading screen once first render fires
const obs = new MutationObserver(() => {
  if (document.getElementById('main').children.length > 0) {
    document.getElementById('loading').classList.add('hidden');
    obs.disconnect();
  }
});
obs.observe(document.getElementById('main'), {childList: true});
// fallback
setTimeout(() => document.getElementById('loading').classList.add('hidden'), 4000);
</script>

</body>
</html>
